<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cari Referensi</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="shortcut icon" href="img/cap.svg" type="image/x-icon">
  <style>
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>

<body class="min-h-screen">
    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-slate-200 shadow-sm">
        <div class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between gap-4">
        
            <a href="index.html" class="">
            <button onclick="window.history.back()" class="gap-2 text-slate-600 hover:text-blue-600 transition-colors duration-200 group">
                <i class="fa-solid fa-arrow-left group-hover:-translate-x-1 transition-transform duration-200"></i>
                <span class="font-medium">Kembali</span>
            </button>
            </a>
        
            <div class="flex items-center gap-1 md:gap-2">
        
            <a 
                href="referensi.html"
                class="inline-flex items-center gap-1.5 px-3 md:px-4 py-2 rounded-lg text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 shadow shadow-blue-600/30 hover:shadow-md active:scale-95 transition-all duration-200"
            >
                <span class="">Referensi</span>
            </a>
        
            <div class="w-px h-5 bg-slate-200 mx-1"></div>
        
            <a 
                href="tentang.html"
                class="inline-flex items-center gap-1.5 px-3 md:px-4 py-2 rounded-lg text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 shadow shadow-blue-600/30 hover:shadow-md active:scale-95 transition-all duration-200"
            >
                <span>Tentang</span>
            </a>
        
            </div>
        </div>
    </nav>
  <div class="max-w-5xl mx-auto px-4 py-16">

    <div class="text-center mb-12">
      <h1 class="text-4xl font-bold text-slate-900 mb-2">Cari Referensi</h1>
      <p class="text-slate-500">Temukan judul tugas akhir dengan cepat & akurat</p>
    </div>

    <div class="bg-white rounded-2xl shadow p-6 mb-8">
      <div class="grid md:grid-cols-3 gap-4">

        <input id="filterTahun" placeholder="2024"
          class="px-4 py-3 bg-slate-100 rounded-lg focus:ring-2 focus:ring-slate-400 outline-none" />

        <select id="filterJurusan"
          class="px-4 py-3 bg-slate-100 rounded-lg focus:ring-2 focus:ring-slate-400 outline-none">
          <option value="">Semua Jurusan</option>
        </select>

        <input id="filterNama" placeholder="Nama Penulis"
          class="px-4 py-3 bg-slate-100 rounded-lg focus:ring-2 focus:ring-slate-400 outline-none" />

      </div>

      <div class="text-center mt-6">
        <button onclick="cariReferensi()"
          class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-4 rounded-xl transition-all duration-200 shadow-blue-600/30  active:translate-y-0 px-4 gap-2">
          Cari Referensi
        </button>
      </div>
    </div>

    <div id="infoHasil" class="text-sm text-slate-500 mb-4"></div>

    <div id="hasilCari" class="grid gap-4"></div>

  </div>
<!-- <script src="js/scriptreferensi.js"></script> -->
 <script>
  const BASE_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTNBbQLWjVBQIzXXxWt-VyxwgiyYiYCqv3WOx06jPeOQ8xrIWeAbHhfeADNV4SRDg/pub?output=csv";
const getSheetURL = (gid) => `${BASE_URL}&gid=${gid}`;
const dataURL = getSheetURL(1749465922);

let semuaData = [];

async function loadData() {
  const res = await fetch(dataURL);
  const csv = await res.text();
  const result = Papa.parse(csv, { header: true, skipEmptyLines: true });
  semuaData = result.data;
  isiDropdownJurusan();
}

function isiDropdownJurusan() {
  const select = document.getElementById("filterJurusan");
  const prodiSet = new Set();

  semuaData.forEach(row => {
    if (row.Jurusan) prodiSet.add(row.Jurusan.trim());
  });

  [...prodiSet].sort().forEach(prodi => {
    const opt = document.createElement("option");
    opt.value = prodi;
    opt.textContent = prodi;
    select.appendChild(opt);
  });
}

function cariReferensi() {
  const tahun   = document.getElementById("filterTahun").value.trim();
  const jurusan = document.getElementById("filterJurusan").value.trim();
  const nama    = document.getElementById("filterNama").value.trim().toLowerCase();

  let hasil = semuaData.filter(row => {
    const cocokTahun   = !tahun || row.Tahun?.trim() === tahun;
    const cocokJurusan = !jurusan || row.Jurusan?.trim() === jurusan;
    const cocokNama    = !nama || row.Penulis?.toLowerCase().includes(nama);
    return cocokTahun && cocokJurusan && cocokNama;
  });

  hasil = hasil.slice(0, 20);

  tampilkanHasil(hasil);
}

function tampilkanHasil(hasil) {
  const box = document.getElementById("hasilCari");
  const info = document.getElementById("infoHasil");

  if (hasil.length === 0) {
    info.innerHTML = "";
    box.innerHTML = `
      <div class="text-center py-16 text-slate-400">
        <i class="fa-solid fa-folder-open text-5xl mb-4"></i>
        <p class="font-medium">Tidak ada hasil ditemukan</p>
      </div>`;
    return;
  }

  info.innerHTML = `Menampilkan <b>${hasil.length}</b> hasil`;

  let html = "";

  hasil.forEach(row => {
    html += `
      <div class="bg-white p-5 rounded-xl shadow hover:shadow-lg transition border border-slate-200">

        <div class="flex justify-between gap-4">

          <div>
            <h3 class="font-semibold text-slate-800 mb-2">${row.Judul}</h3>

            <div class="flex flex-wrap gap-3 text-sm text-slate-500">
              <span><i class="fa-solid fa-user mr-1"></i>${row.Penulis || '-'}</span>
              <span><i class="fa-solid fa-building mr-1"></i>${row.Jurusan || '-'}</span>
              <span><i class="fa-solid fa-calendar mr-1"></i>${row.Tahun || '-'}</span>
            </div>
          </div>

          ${row.File && row.File !== '-' ? `
          <a href="${row.File}" target="_blank"
            class="flex items-center gap-2 text-sm bg-blue-50 text-blue-600 px-3 py-2 rounded-lg hover:bg-blue-100">
            <i class="fa-solid fa-link"></i>
          </a>` : ""}

        </div>

      </div>`;
  });

  box.innerHTML = html;
}

loadData();
 </script>

</body>
</html>
