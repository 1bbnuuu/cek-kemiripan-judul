<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cek kemiripan</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <!-- <script src="https://cdn.jsdelivr.net/npm/sastrawijs@1.1.0/dist/sastrawijs.umd.min.js"></script> -->
    <link rel="shortcut icon" href="img/cap.svg" type="image/x-icon">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
</head>
<body class=" min-h-screen font-sans antialiased">
    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-slate-200 shadow-sm">
        <div class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between gap-4">
        
            <a href="index.html" class="flex items-center gap-2 group">
            <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center shadow shadow-blue-600/30 group-hover:bg-blue-700 transition-colors duration-200">
                <i class="fa-solid fa-graduation-cap text-white text-sm"></i>
            </div>
            </a>
        
            <div class="flex items-center gap-1 md:gap-2">
        
            <a 
                href="referensi.html"
                class="inline-flex items-center gap-1.5 px-3 md:px-4 py-2 rounded-lg text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 shadow shadow-blue-600/30 hover:shadow-md active:scale-95 transition-all duration-200"
            >
                <span class="">Referensi</span>
            </a>
            </div>
        </div>
    </nav>
    <div class="container mx-auto px-4 py-8 md:py-16">
        
        <div class="max-w-3xl mx-auto">
            
            <div class="text-center mb-8 md:mb-12 space-y-3">
                <div class="inline-flex items-center justify-center w-16 h-16 md:w-20 md:h-20">
                     <img src="img/logostimik.png" alt="logostimik">
                </div>
                <h1 class="text-3xl md:text-5xl font-bold text-slate-900 tracking-tight">
                    Cek Keunikan Judul Tugas Akhir
                </h1>
                <p class="text-slate-600 text-base md:text-lg max-w-2xl mx-auto leading-relaxed px-4">
                    Bandingkan judul penelitian Anda dengan referensi sebelumnya untuk memastikan tingkat kemiripan dan orisinalitas
                </p>
            </div>

            <div class="p-6 md:p-8 mb-8 md:mb-12">
                <form class="space-y-4">
                    <div class="relative">
                        <div class="relative">
                            <input 
                                type="text" 
                                id="judulInput"
                                placeholder="Masukkan judul..." 
                                class="w-full pl-4 pr-4 py-4 border-2 border-slate-200 rounded-xl focus:outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-50 transition-all duration-200 text-slate-900 placeholder:text-slate-400"
                                required
                            >
                        </div>
                    </div>
                    
                    <button 
                        type="submit"
                        id="cekButton"
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-4 rounded-xl transition-all duration-200 shadow-blue-600/30  active:translate-y-0 flex items-center justify-center gap-2"
                    >
                        <span>Cek Keunikan Judul</span>
                    </button>
                </form>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 md:gap-6">
                
                <div class="bg-white rounded-xl p-6 shadow-lg shadow-slate-200/50 border border-slate-200 hover:shadow-xl transition-all duration-300">
                    <div class="flex items-center gap-4">
                        <div class="flex-shrink-0 w-12 h-12 bg-emerald-100 rounded-lg flex items-center justify-center">
                            <i class="fa-solid fa-building-columns text-emerald-600 text-xl"></i>
                        </div>
                        <div class="flex-1 min-w-0">
                            <p class="text-sm text-slate-600 font-medium mb-1">Prodi</p>
                            <p id="jmlhProdi"
                            class="text-2xl md:text-xl font-bold text-slate-900">-</p>
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-xl p-6 shadow-lg shadow-slate-200/50 border border-slate-200 hover:shadow-xl transition-all duration-300">
                    <div class="flex items-center gap-4">
                        <div class="flex-shrink-0 w-12 h-12 bg-blue-100 rounded-lg flex items-center justify-center">
                            <i class="fa-solid fa-database text-blue-600 text-xl"></i>
                        </div>
                        <div class="flex-1 min-w-0">
                            <p class="text-sm text-slate-600 font-medium mb-1">Total Judul</p>
                            <p id="jmlhJudul"
                            class="text-2xl md:text-xl font-bold text-slate-900">-</p>
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-xl p-6 shadow-lg shadow-slate-200/50 border border-slate-200 hover:shadow-xl transition-all duration-300">
                    <div class="flex items-center gap-4">
                        <div class="flex-shrink-0 w-12 h-12 bg-purple-100 rounded-lg flex items-center justify-center">
                            <i class="fa-solid fa-calendar-days text-purple-600 text-xl"></i>
                        </div>
                        <div class="flex-1 min-w-0">
                            <p class="text-sm text-slate-600 font-medium mb-1">Tahun</p>
                            <p id="rentangTahun"
                            class="text-l md:text-l font-bold text-slate-900">-</p>
                        </div>
                    </div>
                </div>

            </div>

            <div class="mt-12 text-center flex flex-col justify-center">
                <p class="text-sm text-slate-500">
                    <i class="fa-solid fa-circle-info mr-1"></i>
                    Sistem akan mengecek kemiripan dengan database judul yang sudah ada
                </p>
            </div>
        </div>
    </div>
<script src="https://cdn.jsdelivr.net/npm/sastrawijs@1.1.0/dist/sastrawijs.umd.min.js"></script>
<script src="js/script.js"></script>
</body>
</html>
