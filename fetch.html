<!DOCTYPE html>
<html>
<head>
    <title>Total Judul</title>
</head>
<body>

<input type="text" id="searchInput" placeholder="Masukkan judul...">
<button onclick="cariJudul()">Cari</button>

<div id="hasilPencarian"></div>


<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<script>

const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTkbyjy0mm-DEBQ4dTqrB1MHz2aPQv5Gz-GISsuvf1_yQwA4D6xI_AxUZj55xBNg8qoUtbfc_vfHB5-/pub?output=csv";

let semuaData = [];

fetch(url)
.then(res => res.text())
.then(csv => {

    const result = Papa.parse(csv, {
        header: true,
        skipEmptyLines: true
    });

    semuaData = result.data;

})
.catch(err => console.error(err));

function casefolding(judul) {

    const cleaned = judul
        .replace(/[^a-z0-9\s]/gi, "")
        .toLowerCase() // casefolding
        .trim()
        .split(/\s+/); // tokenizing

    return cleaned;
}

function cariJudul() {

    const keyword = document.getElementById("searchInput").value.toLowerCase();

    let hasilHTML = "";

    const hasil = semuaData.filter(row => 
        row.judul.toLowerCase().includes(keyword)
    );

    if (hasil.length === 0) {

        hasilHTML = "Tidak ditemukan";

    } else {

        hasil.forEach(row => {

            const tokenJudul = casefolding(row.judul);

            console.log(tokenJudul);

            hasilHTML += `
                <p>[${tokenJudul.join(", ")}]</p>
            `;
        });

    }

    document.getElementById("hasilPencarian").innerHTML = hasilHTML;
}


</script>


</body>
</html>
